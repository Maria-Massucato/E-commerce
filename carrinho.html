<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sacola de Compras | MXTCS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
      
</head>
<body>
   <div class="container mt-5">
       <h1>Carrinho de Compras</h1>
       <p>Confira os produtos que você adicionou ao seu carrinho:</p>
   </div>
    <div class="container">
         <table class="table table-bordered align-middle">
              <thead>
                <tr>
                     <th scope="col">Imagem</th>
                     <th scope="col">Produto</th>
                     <th scope="col">Preço</th>
                     <th scope="col">Quantidade</th>
                     <th scope="col">Total</th>
                     <th scope="col">Ações</th>
                </tr>
              </thead>
              <tbody>
                <!-- Exemplo de produto na sacola -->
                <tr>
                     <td>
                <img src="img/boosterazura.png" alt="Hidratante Facial" style="width:70px; height:70px; object-fit:cover; border-radius:8px;">
            </td>
            <td>Hidratante Facial</td>
            <td>R$ 49,90</td>
            <td>1</td>
            <td>R$ 49,90</td>
            <td><button class="btn btn-danger">Remover</button></td>
                </tr>
                <!-- Adicione mais produtos conforme necessário -->
              </tbody>
         </table>
    
         <div class="d-flex justify-content-between">
              <h3>Total: R$ 49,90</h3>
              <button class="btn btn-success">Finalizar Compra</button>
         </div>
</body>
</html>
