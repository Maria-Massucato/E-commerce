<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Produtos MXTCS</title>
</head>
<body>
    <aside class="sidebar-filtro">
        <div class="filtro-box">
            <h5>Filtrar por preço</h5>
            <input type="range" min="0" max="500" value="500" class="slider" id="precoRange">
            <div id="precoValor">Qualquer preço</div>
            <hr>
            <h5>Categoria</h5>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="skincare">
                <label class="form-check-label" for="skincare">Skincare</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="maquiagem">
                <label class="form-check-label" for="maquiagem">Maquiagem</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="corpo">
                <label class="form-check-label" for="corpo">Corpo</label>
            </div>
            <hr>
            <h5>Tipo de Produto</h5>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="hidratante">
                <label class="form-check-label" for="hidratante">Hidratante</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="mascara">
                <label class="form-check-label" for="mascara">Máscara Facial</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="sabonete">
                <label class="form-check-label" for="sabonete">Sabonete</label>
            </div>
            <hr>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="ofertas">
                <label class="form-check-label" for="ofertas">Ofertas especiais</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="novidades">
                <label class="form-check-label" for="novidades">Novidades</label>
            </div>
        </div>
    </aside>
</body>
</html>
